<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AU Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #003366; }
    .chart-container { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 30px; height: 300px; }
    body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;}
    header{background:#003366;color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
    table{width:100%;border-collapse:collapse;margin:20px 0;}
    th,td{border:1px solid #ccc;padding:8px;text-align:left;}
    th{background:#003366;color:#fff;}
    button{padding:5px 10px;margin:2px;border:none;border-radius:4px;cursor:pointer;}
    .approve{background:green;color:#fff;}
    .reject{background:red;color:#fff;}
</style>
</head>
<body>
    <div class="stats-grid">
    <div class="stat-card"><h3>Total Enrollees</h3><h2 id="totalCount">0</h2></div>
    <div class="stat-card" style="border-top-color: #28a745;"><h3>Approved</h3><h2 id="approvedCount">0</h2></div>
    <div class="stat-card" style="border-top-color: #dc3545;"><h3>Pending</h3><h2 id="pendingCount">0</h2></div>
</div>

<div class="chart-container">
    <canvas id="enrollmentChart"></canvas>
</div>

<header>
    <h2>Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
</header>

<div style="padding:20px;">
    <table id="studentTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Strand</th>
                <th>Status</th>
                <th>Grade & Section</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<hr>
    
<h2>Admin Panel - Student Records</h2>
<div id="adminList"></div>
    
<script>
// Check admin login
if(localStorage.getItem('adminLoggedIn') !== 'true'){
    location.href = 'admin.html';
}

// Load students
function loadStudents(){
    const students = JSON.parse(localStorage.getItem('students')) || [];
    const tbody = document.querySelector('#studentTable tbody');
    tbody.innerHTML = '';
    students.forEach(s => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${s.id}</td>
            <td>${s.firstName} ${s.lastName}</td>
            <td>${s.strand || '---'}</td>
            <td>${s.status || 'Pending'}</td>
            <td>${s.section || '---'}</td>
            <td>
                <td>
    ${s.status !== 'Approved' ? `<button class="approve" onclick="approve('${s.id}')">Approve</button>` : ''}
    ${s.status !== 'Rejected' ? `<button class="reject" onclick="reject('${s.id}')">Reject</button>` : ''}
    ${s.status !== 'Approved' ? `<button class="delete" style="background:#cc0000;color:#fff;" onclick="deleteStudent('${s.id}')">Delete</button>` : ''}
</td>
        `;
        tbody.appendChild(tr);
    });
}

    // ---------------- DOCUMENT VIEWER ----------------
function loadStudentDocuments(){
    const students = JSON.parse(localStorage.getItem('students')) || [];
    const container = document.getElementById('adminList');

    container.innerHTML = "";

    students.forEach(s => {
        const div = document.createElement('div');
        div.style.border = "1px solid #ccc";
        div.style.padding = "15px";
        div.style.margin = "10px";
        div.style.background = "#fff";

        div.innerHTML = `
            <h3>${s.firstName} ${s.lastName}</h3>
            <p><b>ID:</b> ${s.id}</p>
            <p><b>Status:</b> ${s.status}</p>
            <p><b>Notice:</b></p>
            <p style="white-space:pre-line; background:#eef; padding:10px; border-radius:8px;">
  ${s.notice || "No notice yet"}
</p>

            <h4>Documents</h4>
            <p><a href="${s.documents?.birthCert || '#'}" target="_blank">View PSA Birth Certificate</a></p>
            <p><a href="${s.documents?.goodMoral || '#'}" target="_blank">View Good Moral</a></p>
            <p><a href="${s.documents?.reportCard || '#'}" target="_blank">View Form 138</a></p>

            <h4>Photos</h4>
            ${s.photo ? `<img src="${s.photo}" width="100">` : 'No Photo'}
            ${s.facialPhoto ? `<img src="${s.facialPhoto}" width="100">` : 'No Face'}
        `;

        container.appendChild(div);
    });
}
    
// Approve / Reject
function approve(id){
    let students = JSON.parse(localStorage.getItem('students')) || [];

    students = students.map(s => {
        if(s.id === id){
            s.status = 'Approved';

            if(!s.section) s.section = (Math.floor(Math.random()*3)+1);

            // ✅ ADD NOTICE
            s.notice = `
🎉 Congratulations ${s.firstName}!

Welcome to Arellano University.

You have been officially ADMITTED.

Please proceed to the AU Office / Records Office and submit the following documents:

• Form 138 (Report Card)
• Good Moral Certificate
• PSA Birth Certificate
• 2x2 ID Picture

We are excited to have you as part of our academic community!
            `;
        }
        return s;
    });

    localStorage.setItem('students', JSON.stringify(students));
    loadStudents();
    loadStudentDocuments();
}function reject(id){
    let students = JSON.parse(localStorage.getItem('students')) || [];

    students = students.map(s => {
        if(s.id === id){
            s.status = 'Rejected';

            // ❌ ADD NOTICE
            s.notice = `
We regret to inform you, ${s.firstName},

that your application for admission to Arellano University has not been approved at this time.

You may coordinate with the admissions office for further clarification.

Thank you for your interest in our institution.
            `;
        }
        return s;
    });

    localStorage.setItem('students', JSON.stringify(students));
    loadStudents();
    loadStudentDocuments();
}

function logout(){
    localStorage.removeItem('adminLoggedIn');
    location.href='admin.html';
}

function deleteStudent(id){
    if(!confirm("Are you sure you want to delete this student? This cannot be undone.")) return;

    let students = JSON.parse(localStorage.getItem('students')) || [];
    students = students.filter(s => s.id !== id); // Remove student by ID
    localStorage.setItem('students', JSON.stringify(students));
    loadStudents(); // Refresh table
}

// Initial load
loadStudents();
</script>
</body>
</html>
