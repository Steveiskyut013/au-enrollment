<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arellano University Digital Enrollment</title>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
/* -------- GENERAL STYLES -------- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f6f9;
    margin: 0;
    color: #333;
}
header {
    background: #003366;
    color: white;
    padding: 20px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
}
header img {
    height: 50px;
    margin-right: 15px;
}
h2, h3, h4 { margin: 0 0 15px 0; }
.form-container {
    max-width: 900px;
    margin: 20px auto;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0 16px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
}
button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #003366;
    color: white;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 10px;
}
button:hover {
    background: #0055aa;
}
.step { display: none; }
.step.active { display: block; }
.progress-bar {
    height: 15px;
    background: #ddd;
    border-radius: 10px;
    margin-bottom: 25px;
    overflow: hidden;
}
.progress {
    height: 100%;
    width: 0%;
    background: #003366;
    transition: width 0.3s ease;
}
.photo-preview {
    width: 150px;
    height: 150px;
    border: 2px dashed #003366;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 10px;
}
.photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
}
.video-container { margin: 15px 0; }
.select2-container { width: 100% !important; }
label { font-weight: 600; }
.alert { color: red; font-size: 0.9rem; margin-top: -12px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <img src="au-logo.png" alt="AU Logo">
  <h2>Arellano University Digital Enrollment</h2>
</header>

<div class="form-container">
  <div class="progress-bar">
      <div class="progress" id="progress"></div>
  </div>
  <form id="enrollForm">

    <!-- STEP 1: STUDENT INFO -->
    <div class="step active" id="step1">
      <h3>Step 1: Student Information</h3>
      <input id="lastName" placeholder="Last Name" required>
      <input id="firstName" placeholder="First Name" required>
      <input id="middleInitial" placeholder="Middle Initial">
      <label><input type="checkbox" id="noMI"> No Middle Initial</label>
      <input id="suffix" placeholder="Suffix (Optional)">
      <select id="gender" required>
        <option value="">-- Select Gender --</option>
        <option>Male</option>
        <option>Female</option>
      </select>
      <input type="date" id="birthdate" required>
      <input type="email" id="email" placeholder="Email" required>
      <button type="button" onclick="validateStep(1,2)">Next</button>
    </div>

    <!-- STEP 2: ADDRESS -->
    <div class="step" id="step2">
      <h3>Step 2: Address</h3>

<label>Region</label>
<select id="region" required>
  <option value="">-- Select Region --</option>
  <option value="NCR">National Capital Region (NCR)</option>
</select>

<label>City / Municipality</label>
<select id="province" required></select>

<label>Barangay</label>
<select id="barangay" required></select>

<label>Street / House No / Subdivision</label>
<input id="street" placeholder="Street / House No / Subdivision" required>

<label>ZIP Code</label>
<input id="zip" readonly placeholder="ZIP Code">
</div>

    <!-- STEP 3: FAMILY BACKGROUND -->
    <div class="step" id="step3">
      <h3>Step 3: Family Background</h3>
      <input id="fatherName" placeholder="Father's Name" required>
      <input id="fatherJob" placeholder="Father's Occupation">
      <input id="motherName" placeholder="Mother's Name" required>
      <input id="motherJob" placeholder="Mother's Occupation">
      <input id="guardianContact" placeholder="Guardian Contact Number" required>
      <button type="button" onclick="prevStep(2)">Back</button>
      <button type="button" onclick="validateStep(3,4)">Next</button>
    </div>

    <!-- STEP 4: HIGH SCHOOL -->
    <div class="step" id="step4">
      <h3>Step 4: High School Background</h3>
      <input id="hsSchool" placeholder="School Name" required>
      <input id="hsAddress" placeholder="School Address" required>
      <input id="hsYear" placeholder="Year Graduated" required>
      <input id="hsAwards" placeholder="Honors / Awards">
      <button type="button" onclick="prevStep(3)">Back</button>
      <button type="button" onclick="validateStep(4,5)">Next</button>
    </div>

    <!-- STEP 5: DOCUMENTS & PHOTO -->
    <div class="step" id="step5">
      <h3>Step 5: Documents</h3>
      <input id="emergencyContact" placeholder="Emergency Contact" required>
      <h4>Facial Capture</h4>
      <div class="video-container">
        <video id="video" width="300" height="225" autoplay muted></video><br>
        <button type="button" onclick="captureFace()">Capture Face</button>
      </div>
      <div id="facePreview" class="photo-preview">No Face</div>
      <h4>2x2 Photo</h4>
      <input type="file" id="photoUpload" required onchange="previewImage(this)">
      <div id="photoPreview" class="photo-preview">No Image</div>
      <input type="file" id="birthCert" required>
      <input type="file" id="goodMoral" required>
      <input type="file" id="reportCard" required>
      <button type="button" onclick="prevStep(4)">Back</button>
      <button type="button" onclick="validateStep(5,6)">Next</button>
    </div>

    <!-- STEP 6: COURSE SELECTION -->
    <div class="step" id="step6">
      <h3>Step 6: Selection</h3>
      <select id="Campus" required>
        <option value="">Select Campus</option>
        <option>Main (Legarda)</option>
        <option>Pasig</option>
        <option>Pasay</option>
        <option>Malabon</option>
      </select>
      <select id="GradeLevel" required>
        <option value="">Select Grade</option>
        <option>Grade 11</option>
        <option>Grade 12</option>
      </select>
      <select id="Strand" required>
        <option value="">Select Strand</option>
        <optgroup label="Academic Track">
          <option>ABM</option>
          <option>HUMSS</option>
          <option>STEM</option>
          <option>GAS</option>
        </optgroup>
        <optgroup label="TVL Track">
          <option>ICT</option>
          <option>Home Economics</option>
        </optgroup>
      </select>
      <button type="button" onclick="prevStep(5)">Back</button>
 <button type="button" id="submitBtn">Submit Enrollment</button>
    </div>

  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
// ---------------- MULTI-STEP FORM ----------------
function nextStep(step){
  document.querySelectorAll('.step').forEach(el=>el.classList.remove('active'));
  document.getElementById('step'+step).classList.add('active');
  document.getElementById('progress').style.width = (step/6*100)+'%';
}
function prevStep(step){ nextStep(step); }

function validateStep(current,next){
  const inputs = document.querySelectorAll('#step'+current+' input,#step'+current+' select');
  for(let i of inputs){
    if(i.required && !i.value){
      alert("Please fill all required fields.");
      i.focus();
      return;
    }
  }
  nextStep(next);
}

// ---------------- METRO MANILA ADDRESS DATA ----------------
const addressData = {
  const addressData = {
  "NCR": {
    "Manila": { "Tondo":"1012","Binondo":"1006","Sampaloc":"1008","Ermita":"1000","Santa Cruz":"1003","Quiapo":"1001","Malate":"1004" },
    "Quezon City": {"Diliman":"1101","Cubao":"1109","Novaliches":"1123","Fairview":"1118"},
    "Makati": {"Poblacion":"1200","Bel-Air":"1209","Dasmariñas":"1211"},
    "Pasig": {"San Miguel":"1600","Oranbo":"1605"},
    "Pasay": {"183":"1300","84":"1304"},
    "Malabon": {"Tinajeros":"1470","Longos":"1471"}
  }
};

// ---------------- LOAD CITIES / BARANGAYS ----------------
// Load Cities based on Region
document.getElementById("region").addEventListener("change", function(){
  const region = this.value;
  const citySelect = document.getElementById("province");

  citySelect.innerHTML = '<option value="">-- Select City --</option>';
  document.getElementById("barangay").innerHTML = '<option value="">-- Select Barangay --</option>';
  document.getElementById("zip").value = '';

  if(region && addressData[region]){
    Object.keys(addressData[region]).forEach(city=>{
      citySelect.innerHTML += `<option value="${city}">${city}</option>`;
    });
  }
});

// Load Barangays
document.getElementById("province").addEventListener("change", function(){
  const region = document.getElementById("region").value;
  const city = this.value;
  const barangaySelect = document.getElementById("barangay");

  barangaySelect.innerHTML = '<option value="">-- Select Barangay --</option>';
  document.getElementById("zip").value = '';

  if(region && city && addressData[region][city]){
    Object.keys(addressData[region][city]).forEach(brgy=>{
      barangaySelect.innerHTML += `<option value="${brgy}">${brgy}</option>`;
    });
  }
});

// Auto ZIP
document.getElementById("barangay").addEventListener("change", function(){
  const region = document.getElementById("region").value;
  const city = document.getElementById("province").value;
  const brgy = this.value;

  document.getElementById("zip").value =
    region && city && brgy && addressData[region][city][brgy]
    ? addressData[region][city][brgy]
    : '';
});

// ---------------- MIDDLE INITIAL TOGGLE ----------------
document.getElementById("noMI").addEventListener("change", function(){
  const mi = document.getElementById("middleInitial");
  if(this.checked){ mi.value="N/A"; mi.disabled=true; } else{ mi.value=""; mi.disabled=false; }
});

// ---------------- IMAGE PREVIEW ----------------
function previewImage(input){
  const reader = new FileReader();
  reader.onload = e => document.getElementById("photoPreview").innerHTML = `<img src="${e.target.result}">`;
  reader.readAsDataURL(input.files[0]);
}

// ---------------- CAMERA & FACE CAPTURE ----------------
const video = document.getElementById('video');
const canvas = document.createElement('canvas');
canvas.width = 300; canvas.height = 225;
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream)
.catch(err=>console.warn("Camera not available", err));
function captureFace(){
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const faceData = canvas.toDataURL();
  document.getElementById('facePreview').innerHTML = `<img src="${faceData}">`;
  localStorage.setItem("face", faceData);
}

// ---------------- FORM SUBMISSION ----------------
// ---------------- FORM SUBMISSION ----------------
function submitForm(){
  // Validate Step 6 required fields
  const step6Inputs = document.querySelectorAll('#step6 select');
  for(let i of step6Inputs){
    if(!i.value){
      alert("Please fill all required fields in Step 6.");
      i.focus();
      return;
    }
  }

  const student = {
    id: "AU-"+Math.floor(Math.random()*999999),
    firstName: document.getElementById('firstName').value,
    lastName: document.getElementById('lastName').value,
    middleInitial: document.getElementById('middleInitial').value || "N/A",
    suffix: document.getElementById('suffix').value || "N/A",
    gender: document.getElementById('gender').value,
    birthdate: document.getElementById('birthdate').value,
    email: document.getElementById('email').value,
    region: document.getElementById('region').value,
    province: document.getElementById('province').value,
    barangay: document.getElementById('barangay').value,
    street: document.getElementById('street').value,
    zip: document.getElementById('zip').value,
    fatherName: document.getElementById('fatherName').value,
    fatherJob: document.getElementById('fatherJob').value || "N/A",
    motherName: document.getElementById('motherName').value,
    motherJob: document.getElementById('motherJob').value || "N/A",
    guardianContact: document.getElementById('guardianContact').value,
    hsSchool: document.getElementById('hsSchool').value,
    hsAddress: document.getElementById('hsAddress').value,
    hsYear: document.getElementById('hsYear').value,
    hsAwards: document.getElementById('hsAwards').value || "N/A",
    emergencyContact: document.getElementById('emergencyContact').value,
    campus: document.getElementById('Campus').value,
    grade: document.getElementById('GradeLevel').value,
    strand: document.getElementById('Strand').value,
    photo: document.querySelector('#photoPreview img')?.src || "",
    facialPhoto: localStorage.getItem("face") || "",
    status: "Pending"
  };

  let db = JSON.parse(localStorage.getItem('students')) || [];
  db.push(student);
  localStorage.setItem('students', JSON.stringify(db));
  alert("Enrollment Submitted!\nYour ID: "+student.id);
  location.reload();
}

// Change Step 6 button to call submitForm()
document.getElementById('submitBtn').addEventListener('click', submitForm);

document.addEventListener("DOMContentLoaded", loadCities);
</script>
</body>
</html>
